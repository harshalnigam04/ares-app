version: '5.1.1'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile_Backend
    hostname: backend-host
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - ares-networks

  frontend:
    build:
      context: .
      dockerfile: Dockerfile_Frontend
    hostname: frontend-host
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend-host:8000/api
    ports:
      - "3000:3000"
    links:
      - backend
    depends_on:
      - backend
    networks:
      - ares-networks

networks:
  ares-networks:
    driver: bridge